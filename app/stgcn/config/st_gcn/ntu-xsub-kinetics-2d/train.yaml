# Пути относительно cwd (запуск из корня stgcn: python main.py recognition -c ...).
# обучение с нуля (без загрузки весов Kinetics)
work_dir: ./work_dir/recognition/ntu-xsub-kinetics-2d-fromscratch/ST_GCN

# feeder: Kinetics-формат (N,3,T,18,2); сборка из tools/build_ntu_xsub_2d_25_18 → *_data18.npy
feeder: feeder.feeder.Feeder
train_feeder_args:
  random_choose: True
  random_move: True
  window_size: 150
  data_path: ./data/NTU-RGB-D-2D-from-color/xsub_train_data18.npy
  label_path: ./data/NTU-RGB-D-2D-from-color/xsub_train_label.pkl
test_feeder_args:
  data_path: ./data/NTU-RGB-D-2D-from-color/xsub_val_data18.npy
  label_path: ./data/NTU-RGB-D-2D-from-color/xsub_val_label.pkl

# модель как для Kinetics, но num_class=60 (NTU)
model: net.st_gcn.Model
model_args:
  in_channels: 3
  num_class: 60
  edge_importance_weighting: True
  graph_args:
    layout: 'openpose'
    strategy: 'spatial'

# обучение
device: [0]
batch_size: 32
test_batch_size: 32

# оптимизация
base_lr: 0.1
# step: [40, 60]
num_epoch: 50

eval_interval: 3
save_interval: 3
log_interval: 100
