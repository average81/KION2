# NTU RGB+D 2D — Cross-View. После обучения укажите --weights путь к чекпоинту.
# После обучения укажите: --weights ./work_dir/recognition/ntu-xview-2d/ST_GCN/epoch80_model.pt
weights: ./work_dir/recognition/ntu-xview-2d/ST_GCN/epoch80_model.pt

# feeder
feeder: feeder.feeder.Feeder
test_feeder_args:
  data_path: ./data/NTU-RGB-D-2D/xview/val_data.npy
  label_path: ./data/NTU-RGB-D-2D/xview/val_label.pkl

# model
model: net.st_gcn.Model
model_args:
  in_channels: 3
  num_class: 60
  dropout: 0.5
  edge_importance_weighting: True
  graph_args:
    layout: 'ntu-rgb+d'
    strategy: 'spatial'

# test
phase: test
device: 0
test_batch_size: 64
